# Static analysis and lint checks. Errors fail the workflow.

name: Code Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libc6-dev libgl1-mesa-dev libxcursor-dev libxi-dev \
            libxinerama-dev libxrandr-dev libxxf86vm-dev \
            libasound2-dev pkg-config xorg-dev xvfb

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run go vet
        run: go vet ./...

      # go fix -diff prints a patch and exits non-zero when a modernizer still
      # applies. It skips build-tag-excluded files, hence the second pass.
      - name: Check go fix modernizers
        run: |
          go fix -diff ./...
          go fix -diff -tags race ./...

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.9.0
          args: --timeout=5m

      - name: Check for multiple consecutive blank lines
        run: ./scripts/check-multiple-blank-lines.sh
