# https://taskfile.dev
version: '3'

vars:
  GOFLAGS: -buildvcs=false

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  deps:
    desc: Download and verify dependencies
    cmds:
      - go mod download
      - go mod verify

  build:
    desc: Build all packages
    cmds:
      - GOFLAGS="{{.GOFLAGS}}" go build -v ./...

  vet:
    desc: Run go vet for static analysis
    cmds:
      - go vet ./...

  fix:check:
    desc: Fail if any go fix modernizer still applies
    summary: |
      Runs the Go fix tool in diff mode, which exits non-zero and prints a patch
      when a modernizer (interface{} to any, three-clause loops to for-range over
      an integer, strings.Cut, and so on) still applies. Run `go fix ./...` to
      apply the patch, then review it: the fixers occasionally leave a redundant
      assignment behind.

      The tool skips files excluded by build tags, so the race-tagged sources are
      checked in a second pass.
    cmds:
      - go fix -diff ./...
      - go fix -diff -tags race ./...

  test:
    desc: Run all tests
    cmds:
      - go test -v ./...
    env:
      CGO_ENABLED: 1

  test:headless:
    desc: Run tests with a virtual display (for Ebiten/CI)
    cmds:
      - xvfb-run -a go test -v ./...

  lint:
    desc: Run linters and helper checks
    cmds:
      - task: vet
      - task: fix:check
      - |
        if command -v staticcheck >/dev/null 2>&1; then
          staticcheck ./...
        else
          echo "staticcheck not installed, skipping..."
        fi
      - |
        if command -v golangci-lint >/dev/null 2>&1; then
          golangci-lint run --timeout=5m
        else
          echo "golangci-lint not installed, skipping..."
        fi
      - xvfb-run -a go test -race -short ./...
      - ./scripts/check-multiple-blank-lines.sh

  setup:
    desc: Download dependencies for a fresh checkout
    cmds:
      - task: deps

  install:tools:
    desc: Install development tools
    cmds:
      - go install honnef.co/go/tools/cmd/staticcheck@latest
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
